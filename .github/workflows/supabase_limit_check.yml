name: Supabase Keep Alive

on:
  schedule:
    # 毎日 午前0時（UTC）に実行
    # 毎日 午前0時（UTC）に実行
    - cron: '0 0 * * *'
    - cron: '0 12 * * *'
  workflow_dispatch: # 手動実行用ボタンも作っておく

jobs:
  ping:
    runs-on: ubuntu-latest
    environment: NEXT_PUBLIC_SUPABASE_URL 
    steps:
      - name: Send request to Supabase
        # モニターに関しては統計情報のみにアクセスできるものとしてMONITOR_SECRETとして自作認証キーを使用している。
        # そのためsupabaseのURLのEnviromentとして登録しているが、supabaseそのもののAPIキーではない点には注意が必要
        env:
          MONITOR_SECRET: ${{ secrets.MONITOR_SECRET }}
        run: |
          curl --fail -i -X GET "https://www.yourselflm.org/api/monitor" \
            -H "Authorization: Bearer ${MONITOR_SECRET}"